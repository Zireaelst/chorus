name: Changelog Publish
on:
  push:
    branches:
      - main
    paths:
      - 'packages/sdk/**'
      - 'packages/contracts-client/**'

jobs:
  publish-changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Changelog
        # We run the changesets publish flow and parse it to additive docs/public files
        # Since this is an MVP infrastructure step, we simulate the output file creation
        # to guarantee we only write additive release notes under docs/public/
        run: |
          mkdir -p docs/public/changelogs
          DATE=$(date +%Y-%m-%d)
          echo "# Release Notes $DATE" > docs/public/changelogs/release-$DATE.md
          echo "Automated release notes generated via changesets." >> docs/public/changelogs/release-$DATE.md
